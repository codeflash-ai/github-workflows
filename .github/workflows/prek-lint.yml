name: Prek Lint

on:
  workflow_call:
    inputs:
      auto-fix:
        description: "Run ruff fix + format and push fixes before prek check"
        type: boolean
        default: false
      checkout-ref:
        description: "Git ref to checkout (use github.head_ref for auto-fix mode)"
        type: string
        default: ""
      prek-extra-args:
        description: "Extra args for prek-action"
        type: string
        default: ""
      restore-paths:
        description: "Space-separated paths to git checkout HEAD after auto-fix (e.g. version files)"
        type: string
        default: ""
      continue-on-error:
        description: "Whether prek failures should be non-blocking"
        type: boolean
        default: false

jobs:
  prek:
    runs-on: ubuntu-latest
    continue-on-error: ${{ inputs.continue-on-error }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || '' }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Auto-fix formatting
        if: inputs.auto-fix
        run: |
          uv run ruff check --fix . || true
          uv run ruff format .
          if [ -n "$RESTORE_PATHS" ]; then
            git checkout HEAD -- $RESTORE_PATHS 2>/dev/null || true
          fi
        env:
          RESTORE_PATHS: ${{ inputs.restore-paths }}

      - name: Commit and push fixes
        if: inputs.auto-fix
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "style: auto-format with ruff"
          git push

      - uses: j178/prek-action@v2
        with:
          extra-args: ${{ inputs.prek-extra-args || format('--from-ref origin/{0} --to-ref HEAD', github.base_ref) }}
